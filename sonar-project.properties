#
# SonarQube / SonarCloud project configuration
#
# This file is the SINGLE SOURCE OF TRUTH for analysis scope and C/C++/Python
# settings. Use it for both local runs and CI so local and SonarCloud match.
# See: docs/guides/2026-02-03_CONFIGURING_LOCAL_SONAR_SCANNER_TO_MATCH_SONARCLOUD.md
#
# Supplied by script/CI (do not commit secrets here):
#   sonar.projectKey, sonar.organization, sonar.host.url, sonar.token
#   sonar.cfamily.compile-commands (or build-wrapper-output) when available
#

# ----- Analysis scope (must match between local and SonarCloud) -----
# Free tier limit: 50k LOC. Exclude tests, embedded fonts, external, scripts, docs to stay under and match cloud.
sonar.sources=.
sonar.exclusions=external/**,build/**,**/build/**,**/*.pb.h,**/*.pb.cc,tests/**,**/EmbeddedFont_*.cpp,scripts/**,docs/**

# ----- Encoding -----
sonar.sourceEncoding=UTF-8

# ----- C/C++ (CFamily) -----
sonar.cfamily.cache.enabled=true
sonar.cfamily.cache.path=.sonar/cache

# ----- Python -----
sonar.python.version=3.11


