# Build FindHelper on Windows, macOS, Linux.
# Triggers:
#   - workflow_dispatch: manual run (build + test only, no release)
#   - push to main: build + test + publish rolling "latest" pre-release (public repo only)
#   - push of vX.Y.Z tag: build + test + publish versioned release (public repo only)
# Private repo: only workflow_dispatch runs (no automatic runs on push).
name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*.*.*']

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.repository.private != true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            config: Release
            artifact_name: FindHelper-Windows-x64
            artifact_path: build/Release/FindHelper.exe
            package_name: FindHelper-Windows-x64.zip
            build_with_boost: false
          - os: macos-latest
            config: Release
            artifact_name: FindHelper-macOS
            artifact_path: build/FindHelper.app
            package_name: FindHelper-macOS.zip
            build_with_boost: true
          - os: ubuntu-20.04
            # 20.04 → glibc 2.31; keeps Linux artifact runnable on older distros (24.04 would require glibc 2.39)
            config: Release
            artifact_name: FindHelper-Linux-x64
            artifact_path: build/FindHelper
            package_name: FindHelper-Linux-x64.tar.gz
            build_with_boost: true

    runs-on: ${{ matrix.os }}

    env:
      BUILD_WITH_BOOST: ${{ matrix.build_with_boost }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg (Windows, Boost)
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: vcpkg-win-boost-minimal-2
        if: matrix.os == 'windows-latest' && env.BUILD_WITH_BOOST == 'true'

      - name: Install vcpkg and Boost (Windows, minimal)
        if: matrix.os == 'windows-latest' && env.BUILD_WITH_BOOST == 'true' && steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/Microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
          # Subset we use: headers (base) + unordered + regex + lockfree (only regex is built)
          .\vcpkg\vcpkg install boost-headers boost-unordered boost-regex boost-lockfree

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-20.04'
        run: |
          PACKAGES="build-essential cmake pkg-config libglfw3-dev libgl1-mesa-dev libglu1-mesa-dev libcurl4-openssl-dev libfontconfig1-dev libx11-dev libxss-dev wayland-protocols libwayland-dev libxkbcommon-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libwayland-bin"
          if [ "${{ env.BUILD_WITH_BOOST }}" = "true" ]; then PACKAGES="$PACKAGES libboost-dev"; fi
          sudo apt-get update
          sudo apt-get install -y $PACKAGES

      - name: Install macOS dependencies (Boost)
        if: matrix.os == 'macos-latest' && env.BUILD_WITH_BOOST == 'true'
        run: brew install boost

      - name: Configure (Windows, with Boost)
        if: matrix.os == 'windows-latest' && env.BUILD_WITH_BOOST == 'true'
        run: cmake -B build -S . -A x64 -DBUILD_TESTS=ON -DENABLE_MFT_METADATA_READING=ON -DFAST_LIBS_BOOST=ON -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure (Windows, without Boost)
        if: matrix.os == 'windows-latest' && env.BUILD_WITH_BOOST != 'true'
        run: cmake -B build -S . -A x64 -DBUILD_TESTS=ON -DENABLE_MFT_METADATA_READING=ON

      - name: Configure (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          EXTRA=""; [ "${{ env.BUILD_WITH_BOOST }}" = "true" ] && EXTRA="-DFAST_LIBS_BOOST=ON"
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON $EXTRA

      - name: Configure (Linux)
        if: matrix.os == 'ubuntu-20.04'
        run: |
          EXTRA=""; [ "${{ env.BUILD_WITH_BOOST }}" = "true" ] && EXTRA="-DFAST_LIBS_BOOST=ON"
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON $EXTRA

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake --build build --config ${{ matrix.config }}

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: cmake --build build --config ${{ matrix.config }}

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-20.04'
        run: cmake --build build

      - name: Run tests (Windows)
        if: matrix.os == 'windows-latest'
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

      - name: Run tests (macOS)
        if: matrix.os == 'macos-latest'
        run: ctest --test-dir build --output-on-failure

      - name: Run tests (Linux)
        if: matrix.os == 'ubuntu-20.04'
        run: ctest --test-dir build --output-on-failure

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path ${{ matrix.artifact_path }} -DestinationPath ${{ matrix.package_name }}

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: zip -r ${{ matrix.package_name }} ${{ matrix.artifact_path }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-20.04'
        run: tar -czf ${{ matrix.package_name }} -C build FindHelper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_name }}

  # ── Release ──────────────────────────────────────────────────────────────────
  # Runs once after all three build jobs complete. Skipped on workflow_dispatch.
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets/

      # push to main → create/replace rolling "latest" pre-release
      - name: Publish rolling pre-release (latest)
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          SUBJECT=$(git log -1 --pretty=format:'%s')
          NOTES="Automated build from \`main\` at ${SHORT_SHA}.

          Not a stable release — download a versioned release for production use.

          **Commit:** ${SHORT_SHA} — ${SUBJECT}"

          # Delete existing latest release + tag before recreating
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          gh release create latest \
            --prerelease \
            --title "Latest build (${SHORT_SHA})" \
            --notes "${NOTES}" \
            release-assets/*

      # push of vX.Y.Z tag → create proper versioned release
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "FindHelper ${{ github.ref_name }}" \
            --generate-notes \
            release-assets/*
